name: Trigger website rebuild

on:
  push:
    branches: [main]

permissions: {}

jobs:
  deploy:
    name: POST to Vercel deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set on this repository."
            exit 1
          fi
          response=$(curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL")
          echo "Vercel response: $response"
